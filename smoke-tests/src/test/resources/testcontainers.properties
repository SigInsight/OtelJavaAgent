# https://github.com/testcontainers/testcontainers-java/issues/3531
transport.type=httpclient5

# Bound the testcontainers image-pull retry loop. RemoteDockerImage resolves a pull with
# Awaitility atMost = pull.timeout (default 120s) and pollInSameThread; because polling runs
# inline (SameThreadExecutorService), a blocking pull that eventually SUCCEEDS is never cut
# off by atMost — only FAILED polls (e.g. ghcr "manifest unknown" returned as HTTP 500,
# retried as InternalServerErrorException) are bounded. Lowering this makes a missing/typo'd
# image tag fail fast (loud red) instead of retrying for 120s per test invocation. Legitimate
# pulls, however slow, are unaffected.
pull.timeout=30
