name: Metadata Update

# Weekly full collection of instrumentation metadata. If docs/instrumentation-list.yaml
# is out of date, opens (or comments on) an issue to remind a human to update it.
# Intentionally does NOT commit, push, or open a PR — the repo is mirrored from a
# self-hosted GitLab, so automated commits on the GitHub side would diverge from GitLab.

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:
    inputs:
      debug_logging:
        description: 'Enable debug logging'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    - cron: "7 2 * * 1" # weekly Monday 02:07 UTC

permissions:
  contents: read

concurrency:
  group: metadata-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Free disk space
        run: .github/scripts/gha-free-disk-space.sh

      - name: Set up JDK for running Gradle
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version-file: .java-version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Collect telemetry
        env:
          DEBUG_LOGGING: ${{ inputs.debug_logging || 'false' }}
        run: ./.github/scripts/metadata-ci-collect.sh

      - name: Run documentation analyzer
        run: ./gradlew :instrumentation-docs:runAnalysis

      - name: Check for diff
        id: diffcheck
        run: |
          git add docs/instrumentation-list.yaml
          if ! git diff --cached --quiet; then
            echo "has_diff=true" >> $GITHUB_OUTPUT
          else
            echo "has_diff=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail PR when instrumentation metadata is out of date
        if: steps.diffcheck.outputs.has_diff == 'true' && github.event_name == 'pull_request'
        run: |
          echo "Instrumentation metadata is out of date for this PR." >> $GITHUB_STEP_SUMMARY
          echo >> $GITHUB_STEP_SUMMARY
          echo "Run the following locally and commit the updated docs/instrumentation-list.yaml:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo './.github/scripts/metadata-ci-collect.sh' >> $GITHUB_STEP_SUMMARY
          echo './gradlew :instrumentation-docs:runAnalysis' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "metadata-update detected changes in docs/instrumentation-list.yaml. Run ./.github/scripts/metadata-ci-collect.sh and ./gradlew :instrumentation-docs:runAnalysis locally, then commit the regenerated file." >&2
          exit 1

      - name: Open issue to remind about metadata update
        if: steps.diffcheck.outputs.has_diff == 'true' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          issue_title="chore: update instrumentation list [automated reminder]"
          # dedup: reuse an existing open issue with the same title
          existing=$(gh issue list --search "in:title $issue_title" --state open --limit 1 --json number -q '.[].number')
          body="The instrumentation metadata is out of date. Run \`./.github/scripts/metadata-ci-collect.sh\` locally first, then run \`./gradlew :instrumentation-docs:runAnalysis\`, then commit and push \`docs/instrumentation-list.yaml\` to main (commit on the GitLab side so the mirror stays in sync). See [$GITHUB_WORKFLOW #$GITHUB_RUN_NUMBER](https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID)."
          if [[ -z "$existing" ]]; then
            gh issue create --title "$issue_title" --body "$body"
          else
            gh issue edit "$existing" --body "$body"
            gh issue comment "$existing" --body "Still out of date as of run #$GITHUB_RUN_NUMBER ($GITHUB_RUN_ID). Run \`./.github/scripts/metadata-ci-collect.sh\` first, then \`./gradlew :instrumentation-docs:runAnalysis\`."
          fi

      - name: Close metadata update reminder issue when no diff exists
        if: steps.diffcheck.outputs.has_diff == 'false' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          issue_title="chore: update instrumentation list [automated reminder]"
          mapfile -t existing < <(gh issue list --search "in:title $issue_title" --state open --limit 100 --json number -q '.[].number')
          if [[ ${#existing[@]} -eq 0 ]]; then
            exit 0
          fi
          for issue_number in "${existing[@]}"; do
            gh issue close "$issue_number" --comment "Closing automatically because instrumentation metadata is up to date as of run #$GITHUB_RUN_NUMBER ($GITHUB_RUN_ID)."
          done

  workflow-notification:
    permissions:
      contents: read
      issues: write
    needs:
      - update
    if: always()
    uses: ./.github/workflows/reusable-workflow-notification.yml
    with:
      success: ${{ needs.update.result == 'success' }}
